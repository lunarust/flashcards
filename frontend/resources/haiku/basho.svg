<svg viewBox="0 0 220 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: "Noto Serif JP", serif;
      font-size: 24px;
      //fill: none;
      stroke: #efefef;
      stroke-width: 1.3;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: draw 2s ease forwards;
    }
    .line1b {
      animation-delay: 0.6s;
      font-size: 18px;
    }
    .line2 {
      animation-delay: 1.8s;
    }

    .line3 {
      animation-delay: 3.6s;
    }

    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>
<rect>
  <animate attributeName="x" from="0" to="100" dur="2s" begin="click" />
</rect>

  <!-- Line 1 -->
  <text x="55" y="150" text-anchor="middle" writing-mode="vertical-rl">
    古池
  </text>

  <text class="line1b" x="55" y="195" text-anchor="end" writing-mode="vertical-rl">や</text>

  <!-- Line 2 -->
  <text x="110" y="150" class="line2" text-anchor="middle" writing-mode="vertical-rl">
    蛙飛びこむ
  </text>

  <!-- Line 3 -->
  <text x="165" y="150" class="line3" text-anchor="middle"  writing-mode="vertical-rl">
    水の音
  </text>

</svg>
